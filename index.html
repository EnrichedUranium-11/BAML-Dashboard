<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>BAML CFO Risk Impact Dashboard</title>
  
  <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/dist/tabler-icons.min.css">
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <link rel="stylesheet" href="style.css">
  
  <style>
  :root {
    --font-sans: 'Helvetica Now Display', Arial, sans-serif;
    --font-display: 'Helvetica Now Display', Arial, sans-serif;

    --ey-yellow: #FFE600;
    --ey-black: #000000;
    --ey-dark: #2E2E38;
    --ey-grey: #6B7280;
    --ey-lightgrey: #E5E7EB;
    --ey-bg: #F4F6F9;
  }

  @font-face {
    font-family: 'Helvetica Now Display';
    src: url('HelveticaNowDisplay-Regular.woff2') format('woff2');
    font-weight: 400;
    font-style: normal;
    font-display: swap;
  }

  @font-face {
    font-family: 'Helvetica Now Display';
    src: url('HelveticaNowDisplay-Bold.woff2') format('woff2');
    font-weight: 700;
    font-style: normal;
    font-display: swap;
  }

  body {
    font-family: var(--font-sans);
    background: var(--ey-bg);
    color: #111827;
  }

  .display-title {
    font-family: var(--font-display);
  }

  .premium-card {
    background: rgba(255,255,255,0.92);
    backdrop-filter: blur(12px);
    border: 1px solid rgba(0,0,0,0.06);
    box-shadow:
      0 4px 20px rgba(0,0,0,0.04),
      0 1px 4px rgba(0,0,0,0.03);
    border-radius: 16px;
    transition: all 0.25s ease;
  }

  .premium-card:hover {
    transform: translateY(-2px);
    box-shadow:
      0 10px 30px rgba(0,0,0,0.08),
      0 2px 10px rgba(0,0,0,0.05);
  }

  input[type=range] {
    -webkit-appearance: none;
    width: 100%;
    background: #D1D5DB;
    height: 6px;
    border-radius: 999px;
  }

  input[type=range]::-webkit-slider-thumb {
    -webkit-appearance: none;
    height: 18px;
    width: 18px;
    border-radius: 50%;
    background: #000;
    border: 2px solid #FFE600;
    cursor: pointer;
  }

  input[type=range]::-webkit-slider-thumb:hover {
    transform: scale(1.08);
  }

  .heat-cell {
    transition: all 0.15s ease;
  }

  .heat-cell:hover {
    transform: scale(1.08);
    z-index: 10;
  }

  .nav-btn {
    position: relative;
    transition: all 0.2s ease;
  }

  .nav-btn::after {
    content: '';
    position: absolute;
    bottom: 0;
    left: 50%;
    width: 0;
    height: 3px;
    background: var(--ey-yellow);
    transition: all 0.2s ease;
    transform: translateX(-50%);
    border-radius: 3px 3px 0 0;
  }

  .nav-btn.active {
    color: #000;
    font-weight: 700;
  }

  .nav-btn.active::after {
    width: 60%;
  }

  .map-node {
    background: var(--ey-yellow);
    border: 2px solid #fff;
    border-radius: 50%;
    box-shadow: 0 0 10px rgba(255,230,0,0.5);
  }

  .map-node-hq {
    background: #000;
    border: 2px solid var(--ey-yellow);
    border-radius: 50%;
    box-shadow: 0 0 12px rgba(0,0,0,0.5);
  }
    html,
body,
div,
span,
p,
h1,
h2,
h3,
h4,
h5,
h6,
button,
table,
tr,
td,
th,
input,
label,
canvas {
  font-family: 'Helvetica Now Display', Arial, sans-serif !important;
}
</style>
</head>
<body class="p-4 md:p-8">

<div class="max-w-7xl mx-auto space-y-6">
  
  <header class="bg-[#2E2E38] text-white rounded-2xl p-6 shadow-xl flex flex-col lg:flex-row justify-between items-start lg:items-center gap-6 relative overflow-hidden">
    <div class="absolute right-0 top-0 opacity-10 pointer-events-none translate-x-12 -translate-y-6">

    </div>
    
    <div class="flex items-center gap-4 z-10">
      <img src="Untitled.svg" alt="Company Logo" class="h-10 w-auto object-contain rounded-lg">

  <nav class="bg-white p-2 rounded-xl shadow-sm border border-slate-200/60 flex gap-1 overflow-x-auto scrollbar-none">
    <button class="nav-btn active px-4 py-2.5 text-xs md:text-sm font-medium text-slate-500 hover:text-slate-800 rounded-lg flex items-center gap-2" onclick="showTab('overview',this)">
      <i class="ti ti-layout-dashboard text-base text-slate-400"></i> Overview & Supply Map
    </button>
    <button class="nav-btn px-4 py-2.5 text-xs md:text-sm font-medium text-slate-500 hover:text-slate-800 rounded-lg flex items-center gap-2" onclick="showTab('scenarios',this)">
      <i class="ti ti-chart-bar text-base text-slate-400"></i> Macro Scenarios
    </button>
    <button class="nav-btn px-4 py-2.5 text-xs md:text-sm font-medium text-slate-500 hover:text-slate-800 rounded-lg flex items-center gap-2" onclick="showTab('sensitivity',this)">
      <i class="ti ti-adjustments-horizontal text-base text-slate-400"></i> Live Stress Engine
    </button>
    <button class="nav-btn px-4 py-2.5 text-xs md:text-sm font-medium text-slate-500 hover:text-slate-800 rounded-lg flex items-center gap-2" onclick="showTab('hedge',this)">
      <i class="ti ti-shield-check text-base text-slate-400"></i> Hedge Portfolio
    </button>
    <button class="nav-btn px-4 py-2.5 text-xs md:text-sm font-medium text-slate-500 hover:text-slate-800 rounded-lg flex items-center gap-2" onclick="showTab('fx',this)">
      <i class="ti ti-currency-dollar text-base text-slate-400"></i> FX & Yield
    </button>
    <button class="nav-btn px-4 py-2.5 text-xs md:text-sm font-medium text-slate-500 hover:text-slate-800 rounded-lg flex items-center gap-2" onclick="showTab('kpis',this)">
      <i class="ti ti-target text-base text-slate-400"></i> KPIs

  <main id="tab-content" class="space-y-6 opacity-100 transition-opacity duration-200"></main>

</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script>
// Mathematical Baseline
const B = {
  rev:18500,ebitdaM:0.116,ebitda:18500*0.116,
  oreVol:1.2,oreP:120,coalVol:0.6,coalP:210,
  fx:83.25,usdImp:480,usdExp:620,netUsd:140,
  loan:150,sofr:0.043,sprd:220,irsR:0.064,irsPct:0.60,
  oreHR:0.55,oreStr:123,coalHR:0.50,
  nmdc:0.175,frtPct:0.09,frtAbs:0.60,sofrCap:0.055,
  optPrem:32,fxInc:35,covFloor:0.095
};
B.oreSpd=B.oreVol*B.oreP;B.coalSpd=B.coalVol*B.coalP;
B.rmUsd=B.oreSpd+B.coalSpd;B.frtUsd=B.rmUsd*B.frtPct;
B.intUsd=B.loan*(B.sofr+B.sprd/10000);B.intInr=B.intUsd*B.fx/10;
B.covFlrInr=B.rev*B.covFloor;

function calc(oP,fx,fM,sf,hR){
  const eR=sf+B.sprd/10000;
  const oreShk=(B.oreVol*oP*fx-B.oreSpd*B.fx)/10;
  const coalShk=B.coalSpd*(fx-B.fx)/10;
  const frtShk=B.frtUsd*(fM*fx-B.fx)/10;
  const intShk=(B.loan*eR*fx-B.intUsd*B.fx)/10;
  const tot=oreShk+coalShk+frtShk+intShk;
  const uE=B.ebitda-tot;
  const oreG=Math.max(0,oP-B.oreStr)*hR*B.oreVol*fx/10;
  const nmdcR=B.nmdc*B.oreVol*B.oreP*(fx-B.fx)/10;
  const frtR=B.frtAbs*B.frtUsd*(fM-1)*fx/10;
  const irsR=B.irsPct*B.loan*Math.max(0,eR-B.irsR)*fx/10;
  const totR=oreG+nmdcR+frtR+irsR;
  const hE=uE+totR;
  return{oreShk,coalShk,frtShk,intShk,tot,
    oreG,nmdcR,frtR,irsR,totR,
    uE,hE,uM:uE/B.rev,hM:hE/B.rev,
    uHd:uE-B.covFlrInr,hHd:hE-B.covFlrInr};
}

const SCENS=[
  {n:'Baseline Model',oP:120,fx:83.25,fM:1.0,sf:0.043},
  {n:'Iron Ore Spike (+15%)',oP:138,fx:83.25,fM:1.0,sf:0.043},
  {n:'Severe INR Stress (→88)',oP:120,fx:88,fM:1.0,sf:0.043},
  {n:'Global Freight Shock (+20%)',oP:120,fx:83.25,fM:1.2,sf:0.043},
  {n:'Combined Tail Risk Event',oP:138,fx:88,fM:1.2,sf:0.053}
];

let activeTab='overview';
let charts={};
let mapInstance = null;
let sliders={ore:120,fx:83.25,frt:1.0,sofr:4.3,hr:55};

function n2(v){return isNaN(v)?'—':(v<0?'('+Math.abs(v).toFixed(1)+')':v.toFixed(1))}
function pct(v){return(v*100).toFixed(2)+'%'}

function destroyCharts(){
  Object.values(charts).forEach(c=>{try{c.destroy()}catch(e){}});
  charts={};
  if(mapInstance) { mapInstance.remove(); mapInstance = null; }
}

function showTab(t,btn){
  const el=document.getElementById('tab-content');
  el.style.opacity = 0;
  setTimeout(() => {
    destroyCharts();
    activeTab=t;
    document.querySelectorAll('.nav-btn').forEach(b=>b.classList.remove('active'));
    if(btn) btn.classList.add('active');
    renderTab();
    el.style.opacity = 1;
  }, 150);
}

function renderTab(){
  const el=document.getElementById('tab-content');
  if(activeTab==='overview') el.innerHTML=buildOverview();
  else if(activeTab==='scenarios') el.innerHTML=buildScenarios();
  else if(activeTab==='sensitivity') el.innerHTML=buildSensitivity();
  else if(activeTab==='hedge') el.innerHTML=buildHedge();
  else if(activeTab==='fx') el.innerHTML=buildFX();
  else if(activeTab==='kpis') el.innerHTML=buildKPIs();
  
  setTimeout(() => {
    initCharts();
    if(activeTab === 'overview') { initMap(); }
  }, 50);
}

function buildOverview(){
  const comb=calc(138,88,1.2,0.053,0.55);
  return `
  <div class="grid grid-cols-1 lg:grid-cols-3 gap-6 mb-6">
    <div class="premium-card p-5 lg:col-span-2">
      <div class="text-xs font-bold text-slate-400 uppercase tracking-wider mb-4 flex justify-between">
        <span>Global Supply Chain Network</span>
        <span class="color:#FFE600;">Live Infrastructure Mapping</span>
      </div>
      <div id="map" class="w-full h-[320px] rounded-xl border border-slate-200 z-0"></div>
    </div>
    
    <div class="premium-card p-5">
      <div class="text-xs font-bold text-slate-400 uppercase tracking-wider mb-4">Risk Exposure (INR Cr)</div>
      <div class="space-y-4">${buildRiskBars()}</div>
    </div>
  </div>

  <div class="premium-card p-5">
    <div class="text-xs font-bold text-slate-400 uppercase tracking-wider mb-4">EBITDA Waterfall Architecture &bull; Combined Stress Vectors</div>
    <div class="relative h-[280px]"><canvas id="wfChart"></canvas></div>
  </div>`;
}

function buildRiskBars(){
  const items=[
    {l:'Iron Ore Price Shock',v:179.8,max:250},
    {l:'Coal FX Delta Deviation',v:59.9,max:250},
    {l:'Global Freight Premium (+20%)',v:40.5,max:250},
    {l:'Yield Curve Adjustment (+1%)',v:12.5,max:250},
    {l:'Ore Mitigation Capture',v:82.4,max:250},
    {l:'NMDC Index Arbitrage',v:12.0,max:250},
  ];

  return items.map(i=>`
    <div class="space-y-1">
      <div class="flex justify-between text-xs font-medium">
        <span class="text-slate-700 text-[11px]">${i.l}</span>
        <span class="text-black font-bold">₹${i.v.toFixed(1)} Cr</span>
      </div>

      <div class="w-full bg-gray-200 h-2 rounded-full overflow-hidden">
        <div class="h-full rounded-full transition-all duration-500"
          style="
            width:${Math.min(100,i.v/i.max*100)}%;
            background:#FFE600">
        </div>
      </div>
    </div>
  `).join('');
}

function buildScenarios(){
  const rows=SCENS.map(s=>{
    const r=calc(s.oP,s.fx,s.fM,s.sf,0.55);
    const uBad = r.uM < 0.095;
    const hBad = r.hM < 0.095;
    return `<tr class="border-b border-slate-100 hover:bg-slate-50/80 transition-colors text-xs">
      <td class="p-3.5 text-left font-semibold text-slate-800">${s.n}</td>
      <td class="p-3.5 font-medium text-slate-600">${s.oP===120?'&mdash;':'$'+s.oP}</td>
      <td class="p-3.5 font-medium text-slate-600">${s.fx===83.25?'&mdash;':'₹'+s.fx}</td>
      <td class="p-3.5 font-medium text-slate-600">${s.fM===1?'&mdash;':'+20%'}</td>
      <td class="p-3.5 font-medium text-slate-600">${s.sf===0.043?'&mdash;':'+100bps'}</td>
      <td class="p-3.5 font-bold ${uBad?'text-[#5A5A5A] bg-[#E5E7EB]':'text-[#5A5A5A]'}">${pct(r.uM)}</td>
      <td class="p-3.5 font-bold ${hBad?'text-[#5A5A5A]':'text-[#FFE600] bg-[#FFF9CC]'}">${pct(r.hM)}</td>
      <td class="p-3.5 font-bold text-slate-700">₹${n2(r.totR)} Cr</td>
      <td class="p-3.5 font-bold ${r.uHd<0?'text-[#2E2E38]':'text-slate-500'}">${r.uHd<0?'BREACH':'+₹'+n2(r.uHd)}</td>
      <td class="p-3.5 font-bold ${r.hHd<0?'text-[#2E2E38]':'text-[#FFE600]'}">${r.hHd<0?'BREACH':'+₹'+n2(r.hHd)}</td>
    </tr>`;
  }).join('');
  return`
  <div class="premium-card p-5 mb-6">
    <div class="text-xs font-bold text-slate-400 uppercase tracking-wider mb-4">EBITDA Resilience Mapping &bull; Delta vs Covenant Floor (9.5%)</div>
    <div class="relative h-[240px]"><canvas id="scnChart"></canvas></div>
  </div>
  <div class="premium-card overflow-hidden">
    <div class="p-5 border-b border-slate-100 bg-slate-50/40">
      <div class="text-xs font-bold text-slate-400 uppercase tracking-wider">Scenario Stress Matrix Evaluation Table</div>
    </div>
    <div class="overflow-x-auto">
      <table class="w-full text-right border-collapse">
        <thead>
          <tr class="bg-slate-50 text-[11px] font-bold uppercase tracking-wider text-slate-400 border-b border-slate-200">
            <th class="p-3 text-left">Stress Vector</th><th class="p-3">Ore Index</th><th class="p-3">USD/INR</th><th class="p-3">Freight</th><th class="p-3">SOFR</th>
            <th class="p-3">Unhedged %</th><th class="p-3">Hedged %</th><th class="p-3">Mitigations</th><th class="p-3">Unhd. Space</th><th class="p-3">Hedged Space</th>
          </tr>
        </thead>
        <tbody class="divide-y divide-slate-100">${rows}</tbody>
      </table>
    </div>
  </div>`;
}

function buildSensitivity(){
  return`
  <div class="grid grid-cols-1 lg:grid-cols-3 gap-6 items-stretch mb-6">
    <div class="premium-card p-5 lg:col-span-1 flex flex-col justify-between space-y-4">
      <div>
        <div class="text-xs font-bold text-slate-400 uppercase tracking-wider mb-4">Live Multi-Variable Stress Engine</div>
        <div class="space-y-4">
          <div class="space-y-1.5"><div class="flex justify-between text-xs font-semibold text-slate-600"><span>Iron Ore (USD/t)</span><span class="text-slate-900 font-bold" id="sv-ore">$${sliders.ore}</span></div><input type="range" min="90" max="150" step="5" value="${sliders.ore}" id="sl-ore" oninput="updateSlider('ore',+this.value)"></div>
          <div class="space-y-1.5"><div class="flex justify-between text-xs font-semibold text-slate-600"><span>USD/INR Spot</span><span class="text-slate-900 font-bold" id="sv-fx">₹${sliders.fx.toFixed(2)}</span></div><input type="range" min="78" max="92" step="0.5" value="${sliders.fx}" id="sl-fx" oninput="updateSlider('fx',+this.value)"></div>
          <div class="space-y-1.5"><div class="flex justify-between text-xs font-semibold text-slate-600"><span>Freight Multiplier</span><span class="text-slate-900 font-bold" id="sv-frt">${sliders.frt.toFixed(2)}×</span></div><input type="range" min="1.0" max="1.5" step="0.05" value="${sliders.frt}" id="sl-frt" oninput="updateSlider('frt',+this.value)"></div>
          <div class="space-y-1.5"><div class="flex justify-between text-xs font-semibold text-slate-600"><span>SOFR Benchmark</span><span class="text-slate-900 font-bold" id="sv-sofr">${sliders.sofr.toFixed(2)}%</span></div><input type="range" min="3.0" max="7.0" step="0.25" value="${sliders.sofr}" id="sl-sofr" oninput="updateSlider('sofr',+this.value)"></div>
          <div class="space-y-1.5"><div class="flex justify-between text-xs font-semibold text-slate-600"><span>Hedge Ratio</span><span class="text-slate-900 font-bold" id="sv-hr">${sliders.hr}%</span></div><input type="range" min="30" max="70" step="5" value="${sliders.hr}" id="sl-hr" oninput="updateSlider('hr',+this.value)"></div>
        </div>
      </div>
    </div>
    <div class="lg:col-span-2 grid grid-cols-1 sm:grid-cols-2 gap-4" id="live-cards"></div>
  </div>
  <div class="grid grid-cols-1 lg:grid-cols-2 gap-6">
    <div class="premium-card p-5">
      <div class="text-xs font-bold text-slate-400 uppercase tracking-wider mb-3">Unhedged EBITDA Heatmap &bull; (Ore &times; FX)</div>
      <div id="heatmap" class="overflow-x-auto pt-2"></div>
    </div>
    <div class="premium-card p-5">
      <div class="text-xs font-bold text-slate-400 uppercase tracking-wider mb-3">Option Recovery Heatmap &bull; (Shock &times; Ratio)</div>
      <div id="heatmap2" class="overflow-x-auto pt-2"></div>
    </div>
  </div>`;
}

function buildHedge(){
  return`
  <div class="premium-card overflow-hidden mb-6">
    <div class="p-5 border-b border-slate-100 bg-slate-50/40">
      <div class="text-xs font-bold text-slate-400 uppercase tracking-wider">Hedge Instrument Deployment Matrix</div>
    </div>
    <div class="overflow-x-auto">
      <table class="w-full text-left border-collapse">
        <thead>
          <tr class="bg-slate-50 text-[11px] font-bold uppercase tracking-wider text-slate-400 border-b border-slate-200">
            <th class="p-4">Instrument / Strategy</th>
            <th class="p-4">Asset Class</th>
            <th class="p-4 text-center">Current Cover</th>
            <th class="p-4 text-center">Target Band</th>
            <th class="p-4 text-right">Execution Status</th>
          </tr>
        </thead>
        <tbody class="divide-y divide-slate-100 text-sm font-medium">
          <tr class="hover:bg-slate-50 transition-colors">
            <td class="p-4 text-slate-800">Asian Call Options</td><td class="p-4 text-slate-500">Iron Ore Fines</td>
            <td class="p-4 text-center"><span class="px-2 py-1 bg-[#FFF9CC] text-[#2E2E38] rounded-md text-xs font-bold">55%</span></td>
            <td class="p-4 text-slate-500 text-center">50-70%</td><td class="p-4 text-right text-[#FFE600] font-semibold">Active (GIFT City)</td>
          </tr>
          <tr class="hover:bg-slate-50 transition-colors">
            <td class="p-4 text-slate-800">Zero-Cost Collar</td><td class="p-4 text-slate-500">Coking Coal</td>
            <td class="p-4 text-center"><span class="px-2 py-1 bg-[#FFF9CC] text-[#2E2E38] rounded-md text-xs font-bold">50%</span></td>

// Map Initialization
function initMap() {
  const mapEl = document.getElementById('map');
  if(!mapEl) return;
  
  // Cleanup if exists
  if(mapInstance) {
    mapInstance.off();
    mapInstance.remove();
  }
  
  // Create Map instance
  mapInstance = L.map('map', {zoomControl: false, attributionControl: false}).setView([5, 45], 2);
  
  // Premium Dark Tile Layer (CartoDB Dark Matter)
  L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
      subdomains: 'abcd',
      maxZoom: 19
  }).addTo(mapInstance);

  // Custom Icon Definitions
  const iconNode = L.divIcon({ className: 'map-node', iconSize: [12, 12] });
  const iconHQ = L.divIcon({ className: 'map-node-hq', iconSize: [16, 16] });

  // Supply Chain Nodes
  const nodes = {
      india: { coords: [21.0, 78.0], name: "India HQ", desc: "Primary Hub", icon: iconHQ },
      brazil: { coords: [-10.0, -52.0], name: "Brazil", desc: "40% Ore (Vale)", icon: iconNode },
      aus: { coords: [-22.0, 148.0], name: "Australia", desc: "50% Coal (BMA)", icon: iconNode },
      sa: { coords: [-29.0, 24.0], name: "South Africa", desc: "Alloys", icon: iconNode },
      nigeria: { coords: [9.0, 8.0], name: "Nigeria", desc: "Distribution", icon: iconNode },
      vietnam: { coords: [14.0, 108.0], name: "Vietnam", desc: "Fabrication", icon: iconNode }
  };

  // Plot Markers
  Object.values(nodes).forEach(n => {
      L.marker(n.coords, {icon: n.icon})
       .bindTooltip(`<b>${n.name}</b><br><span style="font-size:10px;color:#94a3b8;">${n.desc}</span>`, {direction:'top', offset:[0,-10], className: 'bg-[#1e293b] text-white border-0'})
       .addTo(mapInstance);
  });

  // Plot Curved / Dashed Lines to HQ
  const lineOptions = { color: '#FFE600', weight: 1.5, dashArray: '4, 4', opacity: 0.6 };
  ['brazil', 'aus', 'sa'].forEach(key => {
      L.polyline([nodes[key].coords, nodes.india.coords], lineOptions).addTo(mapInstance);
  });
  
  // Force resize calculation after render to prevent gray box glitch
  setTimeout(() => mapInstance.invalidateSize(), 100);
}

function buildHeatmap(){
  const el=document.getElementById('heatmap');if(!el)return;
  const ores=[90,100,110,120,130,140,150];
  const fxs=[78,80,82,84,86,88,90,92];
  let h=`<div class="flex mb-1 min-w-[500px]" style="padding-left:60px">`;
  fxs.forEach(f=>h+=`<div class="flex-1 text-[10px] font-bold text-slate-400 text-center">${f}</div>`);
  h+=`</div>`;
  ores.forEach(op=>{
    h+=`<div class="flex items-center mb-1 min-w-[500px]"><div class="w-[60px] text-[10px] font-bold text-slate-400 text-right pr-3">$${op}</div>`;
    fxs.forEach(fx=>{
      const r=calc(op,fx,1.0,0.043,0.55);
      const m=r.uM*100;
      const isBase=(op===120&&fx===83.25);
      const bg=m<9.5?'#2E2E38':m<12?'#9CA3AF':'#FFE600';
      const tc=m<9.5?'#FFFFFF':'#000000';
      h+=`<div class="flex-1 heat-cell p-1.5 m-[1px] text-center rounded font-semibold text-[10px]" style="background:${bg}; color:${tc}; ${isBase?'ring-2 ring-slate-900 ring-offset-1 font-bold':''}">${m.toFixed(1)}%</div>`;
    });
    h+=`</div>`;
  });
  el.innerHTML=h;
}

function buildHeatmap2(){
  const el=document.getElementById('heatmap2');if(!el)return;
  const shocks=[0,5,10,15,20,25,30];
  const hrs=[30,40,50,55,60,65,70];
  let h=`<div class="flex mb-1 min-w-[500px]" style="padding-left:50px">`;
  hrs.forEach(hr=>h+=`<div class="flex-1 text-[10px] font-bold text-slate-400 text-center">${hr}%</div>`);
  h+=`</div>`;
  shocks.forEach(shock=>{
    const oP=120*(1+shock/100);
    h+=`<div class="flex items-center mb-1 min-w-[500px]"><div class="w-[50px] text-[10px] font-bold text-slate-400 text-right pr-3">+${shock}%</div>`;
    hrs.forEach(hr=>{
      const gain=Math.max(0,oP-B.oreStr)*(hr/100)*B.oreVol*B.fx/10;
      const isBase=(shock===15&&hr===55);
      const bg=gain<10?'#E5E7EB':gain<50?'#9CA3AF':'#FFE600';
      const tc='#000000';
      h+=`<div class="flex-1 heat-cell p-1.5 m-[1px] text-center rounded font-semibold text-[10px]" style="background:${bg}; color:${tc}; ${isBase?'ring-2 ring-slate-900 ring-offset-1 font-bold':''}">${gain.toFixed(0)}</div>`;
    });
    h+=`</div>`;
  });
  el.innerHTML=h;
}
